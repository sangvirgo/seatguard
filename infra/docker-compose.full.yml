services:
  # ─── Infrastructure ────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: seatguard-postgres
    environment:
      POSTGRES_USER: seatguard
      POSTGRES_PASSWORD: seatguard_dev_2026
      POSTGRES_DB: seatguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seatguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seatguard-net

  redis:
    image: redis:7
    container_name: seatguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seatguard-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: seatguard-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - seatguard-net

  # ─── Backend Services ──────────────────────────────────
  api-gateway:
    build: ../backend/api-gateway
    container_name: seatguard-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - seatguard-net

  auth-service:
    build: ../backend/auth-service
    container_name: seatguard-auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: seatguard
      DB_PASSWORD: seatguard_dev_2026
      DB_NAME: seatguard_auth
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seatguard_auth
      SPRING_DATASOURCE_USERNAME: seatguard
      SPRING_DATASOURCE_PASSWORD: seatguard_dev_2026
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - seatguard-net

  event-service:
    build: ../backend/event-service
    container_name: seatguard-event-service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seatguard_event
      SPRING_DATASOURCE_USERNAME: seatguard
      SPRING_DATASOURCE_PASSWORD: seatguard_dev_2026
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_SECURE: ${CLOUDINARY_SECURE}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - seatguard-net

  booking-service:
    build: ../backend/booking-service
    container_name: seatguard-booking-service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seatguard_booking
      SPRING_DATASOURCE_USERNAME: seatguard
      SPRING_DATASOURCE_PASSWORD: seatguard_dev_2026
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      MOMO_ENABLED: ${MOMO_ENABLED}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT}
      MOMO_RETURN_URL: ${MOMO_RETURN_URL}
      MOMO_NOTIFY_URL: ${MOMO_NOTIFY_URL}
      VNPAY_ENABLED: ${VNPAY_ENABLED}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_PAYMENT_URL: ${VNPAY_PAYMENT_URL}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      VNPAY_IPN_URL: ${VNPAY_IPN_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - seatguard-net

  ticket-service:
    build: ../backend/ticket-service
    container_name: seatguard-ticket-service
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seatguard_ticket
      SPRING_DATASOURCE_USERNAME: seatguard
      SPRING_DATASOURCE_PASSWORD: seatguard_dev_2026
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - seatguard-net

  # ─── Notification Service ──────────────────────────────
  notification-service:
    build: ../notification-service
    container_name: seatguard-notification-service
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: seatguard
      DB_PASSWORD: seatguard_dev_2026
      DB_NAME: seatguard_notification
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - seatguard-net

  # ─── Frontend ──────────────────────────────────────────
  frontend:
    build: ../frontend
    container_name: seatguard-frontend
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway
    environment:
      PORT: "3001"
      NEXT_PUBLIC_AUTH_URL: http://localhost:8081
      NEXT_PUBLIC_EVENT_URL: http://localhost:8082
      NEXT_PUBLIC_BOOKING_URL: http://localhost:8083
      NEXT_PUBLIC_TICKET_URL: http://localhost:8084
    networks:
      - seatguard-net

volumes:
  postgres_data:
  redis_data:

networks:
  seatguard-net:
    driver: bridge
