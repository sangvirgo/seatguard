server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:postgresql://localhost:5432/seatguard_booking
    username: ${DB_USERNAME:seatguard}
    password: ${DB_PASSWORD:seatguard_dev_2026}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:aVeryLongAndSecureSecretKeyForSeatGuardJWT2024PleaseChangeInProduction!56}

booking:
  hold-ttl-seconds: ${BOOKING_HOLD_TTL:300}
  default-amount: ${BOOKING_DEFAULT_AMOUNT:50.00}
  expiry-check-interval-ms: ${BOOKING_EXPIRY_CHECK_MS:30000}

kafka:
  topics:
    booking-events: booking-events

momo:
  enabled: ${MOMO_ENABLED:false}
  partner-code: ${MOMO_PARTNER_CODE:}
  access-key: ${MOMO_ACCESS_KEY:}
  secret-key: ${MOMO_SECRET_KEY:}
  endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn}
  return-url: ${MOMO_RETURN_URL:http://localhost:3001/payment/result}
  notify-url: ${MOMO_NOTIFY_URL:http://localhost:8080/api/payments/momo/ipn}

vnpay:
  enabled: ${VNPAY_ENABLED:false}
  tmn-code: ${VNPAY_TMN_CODE:}
  hash-secret: ${VNPAY_HASH_SECRET:}
  payment-url: ${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL:http://localhost:3001/payment/result}
  ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay/ipn}
