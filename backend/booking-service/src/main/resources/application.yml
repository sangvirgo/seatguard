server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:postgresql://localhost:5432/seatguard_booking
    username: ${DB_USERNAME:seatguard}
    password: ${DB_PASSWORD:seatguard_dev_2026}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

booking:
  hold-ttl-seconds: ${BOOKING_HOLD_TTL:300}
  default-amount: ${BOOKING_DEFAULT_AMOUNT:50.00}
  expiry-check-interval-ms: ${BOOKING_EXPIRY_CHECK_MS:30000}

kafka:
  topics:
    booking-events: booking-events
